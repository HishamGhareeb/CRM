# =====================================================================
# RAL CRM — Twenty CRM self-host stack
# Runs on Oracle Cloud Free Tier (Ubuntu 24.04 ARM / aarch64).
# The Twenty images are multi-arch and run natively on ARM.
#
# Usage on server:
#   cp .env.example .env && edit .env
#   docker compose up -d
#
# Nginx (host-level, see nginx/) terminates TLS and proxies to
# the `server` container on 127.0.0.1:3000.
# =====================================================================

name: ral-crm

services:
  server:
    image: twentycrm/twenty:${TAG:-latest}
    restart: unless-stopped
    # Bind only to localhost — Nginx is the only public entry point.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      SERVER_URL: ${SERVER_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_SECRET: ${APP_SECRET}
      PG_DATABASE_URL: ${PG_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-.local-storage}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-RAL CRM}
      EMAIL_SYSTEM_ADDRESS: ${EMAIL_SYSTEM_ADDRESS:-}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    image: twentycrm/twenty:${TAG:-latest}
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    environment:
      SERVER_URL: ${SERVER_URL}
      APP_SECRET: ${APP_SECRET}
      PG_DATABASE_URL: ${PG_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-.local-storage}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-RAL CRM}
      EMAIL_SYSTEM_ADDRESS: ${EMAIL_SYSTEM_ADDRESS:-}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_DATABASE_USER:-twenty}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE_NAME:-twenty}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER:-twenty} -d ${PG_DATABASE_NAME:-twenty}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data

volumes:
  server-local-data:
  db-data:
  redis-data:
