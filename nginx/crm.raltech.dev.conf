# =====================================================================
# RAL CRM — Nginx reverse proxy for crm.raltech.dev
# Install to: /etc/nginx/sites-available/crm.raltech.dev.conf
# then: ln -s ../sites-available/crm.raltech.dev.conf /etc/nginx/sites-enabled/
#
# The TLS lines below are managed/inserted by certbot (scripts/setup-ssl.sh).
# Until certbot runs, only the :80 server block is active so the ACME
# HTTP-01 challenge can complete.
# =====================================================================

# HTTP -> HTTPS redirect (certbot keeps the ACME challenge location open)
server {
    listen 80;
    listen [::]:80;
    server_name crm.raltech.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name crm.raltech.dev;

    # --- TLS (paths created by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/crm.raltech.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.raltech.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Twenty handles file uploads; allow generous body size.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Twenty uses subscriptions)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
